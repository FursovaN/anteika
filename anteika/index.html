<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anteika — Авторские чаи и кофе</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dark-theme">


  <!-- HEADER -->
  <header class="header" id="header">
    <div class="header__logo" data-page="home">
      <span class="logo-symbol">✦</span>
      <span class="logo-text">Anteika</span>
    </div>
    <nav class="header__nav" id="desktopNav">
      <a class="nav-link active" data-page="home"    href="#">Главная</a>
      <a class="nav-link"        data-page="catalog"  href="#">Каталог</a>
      <a class="nav-link"        data-page="cart"     href="#">
        Корзина&nbsp;<span class="badge" id="cartCount">0</span>
      </a>
      <a class="nav-link"        data-page="about"    href="#">О нас</a>
    </nav>
    <div class="header__actions">
      <button class="btn btn--icon" id="themeToggle" title="Сменить тему">🌙</button>
      <button class="btn btn--icon" id="burgerBtn">☰</button>
    </div>
  </header>


  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu">
    <a class="nav-link" data-page="home"    href="#">Главная</a>
    <a class="nav-link" data-page="catalog" href="#">Каталог</a>
    <a class="nav-link" data-page="cart"    href="#">Корзина</a>
    <a class="nav-link" data-page="about"   href="#">О нас</a>
  </div>


  <!-- SPA ROOT -->
  <main class="main" id="app"></main>


  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__brand">
        <span class="logo-text">Anteika</span>
        <p>Авторские чаи и кофе Токио · Казань</p>
      </div>
      <div class="footer__links">
        <a href="#" data-page="home">Главная</a>
        <a href="#" data-page="catalog">Каталог</a>
        <a href="#" data-page="about">Контакты</a>
      </div>
    </div>
    <div class="footer__copy">© 2025 Anteika. Все права защищены.</div>
  </footer>


  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal__close" id="modalClose">✕</button>
      <div class="modal__body" id="modalBody"></div>
    </div>
  </div>


  <!-- TOAST -->
  <div class="toast" id="toast"></div>


  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
